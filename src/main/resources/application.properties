spring.application.name=aushadh-backend


server.port=8082

spring.datasource.driver-class-name=org.postgresql.Driver


spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PW}


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true	

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreQLDialect
spring.jpa.open-in-view=false

#app.jwt.secret=SmartMedicineSecretKey2024VeryLongAndSecureSecretKeyForJWTTokenGeneration
#app.jwt.expiration=86400000
#app.jwt.refresh-expiration=604800000

app.jwt.expiration=${JWT_SECRET}
app.jwt.refresh-expiration=${JWT_EXPIRATION}